<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles.css">
  <script src="./main.js" defer></script>
</head>
<body>
  <main>
    <form action="#" id="form-el" class="form-el" autocomplete="off">
      <input type="text" id="input-el" class="input-el">
      <div class="btn-wrapper">
        <button id="input-btn" class="btn">save input</button>
        <button id="tab-btn" class="btn">save tab</button>
        <button type="reset" id="delete-btn" class="btn btn--delete">delete all</button>
      </div>
      <ul id="ul-el" class="ul-el"></ul>
    </form>
  </main>
</body>
</html>
